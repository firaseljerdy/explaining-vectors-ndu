        <p style="font-size:12px; color:var(--text-muted);">By <strong style="color:var(--text-secondary);">Firas El Jerdy</strong> &middot; CSC 375, NDU &middot; Last updated: April 15, 2026</p>

    <script>
        const TWO_PI = Math.PI * 2;

        function mapVal(value, inMin, inMax, outMin, outMax) {
            return outMin + (outMax - outMin) * ((value - inMin) / (inMax - inMin));
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function labelFor(value) {
            return value === 1 ? "Admit" : "Reject";
        }

        function signed(value, digits = 2) {
            const fixed = value.toFixed(digits);
            return value >= 0 ? "+" + fixed : fixed;
        }

        class Perceptron {
            constructor(numInputs, learningRate) {
                this.weights = [];
                this.learningRate = learningRate;
                for (let i = 0; i < numInputs; i++) {
                    this.weights[i] = Math.random() * 2 - 1;
                }
            }

            feedforward(inputs) {
                let sum = 0;
                for (let i = 0; i < this.weights.length; i++) {
                    sum += inputs[i] * this.weights[i];
                }
                return this.activate(sum);
            }

            activate(sum) {
                return sum >= 0 ? 1 : -1;
            }

            train(inputs, target) {
                const guess = this.feedforward(inputs);
                const error = target - guess;
                for (let i = 0; i < this.weights.length; i++) {
                    this.weights[i] += error * inputs[i] * this.learningRate;
                }
                return { guess, error };
            }

            weightedSum(inputs) {
                let sum = 0;
                for (let i = 0; i < this.weights.length; i++) {
                    sum += inputs[i] * this.weights[i];
                }
                return sum;
            }
        }

        function buildAdmissionsDataset() {
            const rawAdmitted = [
                [85, 75], [72, 80], [90, 65], [60, 85], [78, 70], [88, 60], [65, 90], [70, 75],
                [80, 72], [75, 78], [82, 68], [68, 82], [92, 58], [55, 88], [77, 73], [85, 62],
                [73, 77], [95, 55], [62, 80], [80, 80]
            ];
            const rawRejected = [
                [45, 50], [30, 60], [50, 40], [35, 55], [40, 45], [55, 35], [25, 65], [48, 42],
                [38, 52], [42, 48], [50, 30], [60, 25], [33, 58], [28, 50], [52, 38], [20, 55],
                [45, 40], [35, 45], [55, 30], [40, 35]
            ];

            function processData(rows, label, targetArray) {
                for (const row of rows) {
                    targetArray.push({
                        exam1: row[0],
                        exam2: row[1],
                        x: mapVal(row[0], 0, 100, -1, 1),
                        y: mapVal(row[1], 0, 100, -1, 1),
                        label
                    });
                }
            }

            const trainingData = [];
            const testingData = [];
            const backgroundPoints = [];

            processData(rawAdmitted.slice(0, 16), 1, trainingData);
            processData(rawRejected.slice(0, 16), -1, trainingData);
            processData(rawAdmitted.slice(16), 1, testingData);
            processData(rawRejected.slice(16), -1, testingData);

            for (let px = 0; px <= 100; px += 4) {
                for (let py = 0; py <= 100; py += 4) {
                    backgroundPoints.push({
                        exam1: px,
                        exam2: py,
                        x: mapVal(px, 0, 100, -1, 1),
                        y: mapVal(py, 0, 100, -1, 1)
                    });
                }
            }

            return {
                trainingData,
                testingData,
                backgroundPoints,
                allData: trainingData.concat(testingData)
            };
        }

        function accuracyFor(perceptron, data) {
            let correct = 0;
            for (const row of data) {
                if (perceptron.feedforward([row.x, row.y, 1]) === row.label) {
                    correct++;
                }
            }
            return correct / data.length;
        }

        const dataset = buildAdmissionsDataset();

        function createReferencePerceptron() {
            const p = new Perceptron(3, 0.01);
            for (let i = 0; i < 6000; i++) {
                const row = dataset.trainingData[i % dataset.trainingData.length];
                p.train([row.x, row.y, 1], row.label);
                if ((i + 1) % dataset.trainingData.length === 0 && accuracyFor(p, dataset.trainingData) === 1) {
                    break;
                }
            }
            return p;
        }

        function createAdmissionsSim() {
            return {
                perceptron: new Perceptron(3, 0.01),
                trainIndex: 0,
                trained: 0,
                converged: false,
                trainAccuracy: 0,
                testAccuracy: 0,
                convergedFrames: 0
            };
        }

        function createLearningPreview() {
            return {
                perceptron: new Perceptron(3, 0.03),
                index: 0,
                example: dataset.trainingData[0],
                beforeWeights: [0, 0, 0],
                afterWeights: [0, 0, 0],
                guess: 0,
                target: 0,
                error: 0
            };
        }

        function stepLearningPreview(state) {
            const row = dataset.trainingData[state.index];
            const inputs = [row.x, row.y, 1];
            state.example = row;
            state.beforeWeights = state.perceptron.weights.slice();
            state.guess = state.perceptron.feedforward(inputs);
            state.target = row.label;
            state.error = state.target - state.guess;
            state.perceptron.train(inputs, row.label);
            state.afterWeights = state.perceptron.weights.slice();
            state.index = (state.index + 1) % dataset.trainingData.length;
        }

        let referencePerceptron = createReferencePerceptron();
        let admissionsSim = createAdmissionsSim();
        let learningPreview = createLearningPreview();
        let currentSlide = 0;
        let slideFrame = 0;

        const slides = [
            {
                number: "SLIDE 01",
                title: "Why Neural Networks?",
                canvasTitle: "From Inputs to Decision",
                hint: "Watch signals flow into one artificial neuron",
                overlay: "Inputs become a binary decision",
                content: `<p class="slide-text">A <strong>neural network</strong> is a computational model inspired by the idea that many simple units can work together to make decisions. We are not trying to copy the biological brain in detail. We are building a system that takes numbers in and produces a useful output.</p>
                <p class="slide-text">For this course, we begin with the smallest possible neural network: a <strong>single artificial neuron</strong> called a <strong>perceptron</strong>. Even one neuron can learn a simple yes/no classification rule from examples.</p>
                <div class="highlight-box"><h4>Scope for This Chapter</h4><p>We will stop at the perceptron: inputs, weights, bias, feedforward, supervised learning, and a train/test split. No hand classifier, no multi-layer networks, and no heavy UI controls yet.</p></div>`,
                draw: drawIntroNetwork
            },
            {
                number: "SLIDE 02",
                title: "The Perceptron",
                canvasTitle: "Admissions Example",
                hint: "Exam 1, Exam 2, and bias flow into one neuron",
                overlay: "Three inputs, one output",
                content: `<p class="slide-text">A <strong>perceptron</strong> has inputs, weights, a bias input, and one output. Each input is multiplied by a weight, all the weighted values are added, and the sign of that total becomes the decision.</p>
                <p class="slide-text">In our admissions example, the inputs are <strong>Exam 1</strong>, <strong>Exam 2</strong>, and a <strong>bias</strong> value of <code>1</code>. The output is a binary guess: <strong>admit</strong> (<code>+1</code>) or <strong>reject</strong> (<code>-1</code>).</p>
                <div class="formula-box"><div class="formula"><span class="var">sum</span> <span class="op">=</span> <span class="var">x0</span><span class="op">*</span><span class="var">w0</span> <span class="op">+</span> <span class="var">x1</span><span class="op">*</span><span class="var">w1</span> <span class="op">+</span> <span class="var">1</span><span class="op">*</span><span class="var">wBias</span></div></div>`,
                draw: drawPerceptronAnatomy

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let W = 0;
        let H = 0;

        function roundedRectPath(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawRoundedRect(x, y, w, h, r, fillStyle, strokeStyle, lineWidth) {
            roundedRectPath(x, y, w, h, r);
            if (fillStyle) {
                ctx.fillStyle = fillStyle;
                ctx.fill();
            }
            if (strokeStyle) {
                ctx.lineWidth = lineWidth || 1;
                ctx.strokeStyle = strokeStyle;
                ctx.stroke();
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, W, H);
            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, "#0f172a");
            grad.addColorStop(1, "#111827");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = "rgba(255,255,255,0.03)";
            for (let i = 0; i < 18; i++) {
                const x = (i * 97) % W;
                const y = (i * 61) % H;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, TWO_PI);
                ctx.fill();
            }
        }

        function drawArrow(x1, y1, x2, y2, color, lineWidth) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            const head = 10;
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = lineWidth || 2;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - head * Math.cos(angle - Math.PI / 6), y2 - head * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x2 - head * Math.cos(angle + Math.PI / 6), y2 - head * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
        }

        function drawSignal(x1, y1, x2, y2, t, color) {
            ctx.strokeStyle = "rgba(255,255,255,0.12)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            const px = lerp(x1, x2, t);
            const py = lerp(y1, y2, t);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, TWO_PI);
            ctx.fill();
        }

        function drawNode(x, y, radius, label, sublabel, color) {
            const grad = ctx.createRadialGradient(x - 8, y - 8, 2, x, y, radius);
            grad.addColorStop(0, color);
            grad.addColorStop(1, "rgba(255,255,255,0.12)");
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, TWO_PI);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "600 14px Inter";
            ctx.textAlign = "center";
            ctx.fillText(label, x, y - 2);
            ctx.fillStyle = "rgba(226,232,240,0.8)";
            ctx.font = "12px Inter";
            ctx.fillText(sublabel, x, y + 16);
        }

        function drawPill(x, y, text, bg, color) {
            ctx.font = "12px JetBrains Mono";
            const width = ctx.measureText(text).width + 20;
            drawRoundedRect(x, y, width, 28, 14, bg, null, 0);
            ctx.fillStyle = color;
            ctx.textAlign = "center";
            ctx.fillText(text, x + width / 2, y + 18);
        }

        function setStats(items) {
            const ids = ["A", "B", "C"];
            for (let i = 0; i < ids.length; i++) {
                const item = items[i];
                document.getElementById("statLabel" + ids[i]).textContent = item.label;
                document.getElementById("statValue" + ids[i]).textContent = item.value;
                document.getElementById("statDot" + ids[i]).style.background = item.color;
            }
        }

        function getSampleStudent() {
            const index = Math.floor(slideFrame / 120) % dataset.allData.length;
            return { student: dataset.allData[index], index };
        }

        function getPlotRect() {
            return {
                left: 70,
                right: W - 28,
                top: 28,
                bottom: H - 86
            };
        }

        function plotX(value, plot) {
            return mapVal(value, 0, 100, plot.left, plot.right);
        }

        function plotY(value, plot) {
            return mapVal(value, 0, 100, plot.bottom, plot.top);
        }

        function drawPlotAxes(plot) {
            drawRoundedRect(plot.left - 12, plot.top - 12, plot.right - plot.left + 24, plot.bottom - plot.top + 24, 16, "rgba(15,23,42,0.36)", "rgba(255,255,255,0.08)", 1);

            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.lineWidth = 1;
            for (let tick = 0; tick <= 100; tick += 20) {
                const x = plotX(tick, plot);
                const y = plotY(tick, plot);
                ctx.beginPath();
                ctx.moveTo(x, plot.top);
                ctx.lineTo(x, plot.bottom);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(plot.left, y);
                ctx.lineTo(plot.right, y);
                ctx.stroke();
            }

            ctx.strokeStyle = "rgba(255,255,255,0.35)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(plot.left, plot.bottom);
            ctx.lineTo(plot.right, plot.bottom);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(plot.left, plot.bottom);
            ctx.lineTo(plot.left, plot.top);
            ctx.stroke();

            ctx.fillStyle = "rgba(226,232,240,0.85)";
            ctx.font = "12px Inter";
            ctx.textAlign = "center";
            ctx.fillText("Exam 1 Score", (plot.left + plot.right) / 2, plot.bottom + 34);

            ctx.save();
            ctx.translate(plot.left - 40, (plot.top + plot.bottom) / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText("Exam 2 Score", 0, 0);
            ctx.restore();
        }

        function drawStudentPoint(student, plot, asSquare, strokeColor, fillColor, size, lineWidth) {
            const x = plotX(student.exam1, plot);
            const y = plotY(student.exam2, plot);
            ctx.strokeStyle = strokeColor;
            ctx.fillStyle = fillColor;
            ctx.lineWidth = lineWidth || 2;
            if (asSquare) {
                ctx.beginPath();
                ctx.rect(x - size / 2, y - size / 2, size, size);
                ctx.fill();
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, TWO_PI);
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawLegend(plot) {
            const y = plot.top + 14;
            drawPill(plot.left + 10, y, "Train: circle", "rgba(15,23,42,0.78)", "#e2e8f0");
            drawPill(plot.left + 134, y, "Test: square", "rgba(15,23,42,0.78)", "#e2e8f0");
            drawPill(plot.left + 270, y, "Blue = admit", "rgba(20,184,166,0.18)", "#99f6e4");
            drawPill(plot.left + 402, y, "Orange = reject", "rgba(249,115,22,0.18)", "#fdba74");
        }

        function drawDecisionGrid(sim, plot) {
            const cellW = (plot.right - plot.left) / 25;
            const cellH = (plot.bottom - plot.top) / 25;
            for (const point of dataset.backgroundPoints) {
                const guess = sim.perceptron.feedforward([point.x, point.y, 1]);
                ctx.fillStyle = guess === 1 ? "rgba(20,184,166,0.12)" : "rgba(244,63,94,0.12)";
                ctx.fillRect(plotX(point.exam1, plot) - cellW * 0.25, plotY(point.exam2, plot) - cellH * 0.25, cellW, cellH);
            }
        }

        function drawDecisionBoundary(weights, plot) {
            if (Math.abs(weights[1]) < 0.0001) {
                return;
            }
            const xA = -1;
            const xB = 1;
            const yA = -(weights[0] * xA + weights[2]) / weights[1];
            const yB = -(weights[0] * xB + weights[2]) / weights[1];

            ctx.save();
            ctx.beginPath();
            ctx.rect(plot.left, plot.top, plot.right - plot.left, plot.bottom - plot.top);
            ctx.clip();

            ctx.strokeStyle = "rgba(255,255,255,0.9)";
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 6]);
            ctx.beginPath();
            ctx.moveTo(mapVal(xA, -1, 1, plot.left, plot.right), mapVal(yA, -1, 1, plot.bottom, plot.top));
            ctx.lineTo(mapVal(xB, -1, 1, plot.left, plot.right), mapVal(yB, -1, 1, plot.bottom, plot.top));
            ctx.stroke();
            ctx.restore();
            ctx.setLineDash([]);
        }

        function updateAdmissionsTraining(stepsPerFrame) {
            if (!admissionsSim.converged) {
                for (let i = 0; i < stepsPerFrame; i++) {
                    const row = dataset.trainingData[admissionsSim.trainIndex];
                    admissionsSim.perceptron.train([row.x, row.y, 1], row.label);
                    admissionsSim.trainIndex = (admissionsSim.trainIndex + 1) % dataset.trainingData.length;
                    admissionsSim.trained++;

                    if (admissionsSim.trainIndex === 0) {
                        admissionsSim.trainAccuracy = accuracyFor(admissionsSim.perceptron, dataset.trainingData);
                        if (admissionsSim.trainAccuracy >= 1) {
                            admissionsSim.converged = true;
                            admissionsSim.testAccuracy = accuracyFor(admissionsSim.perceptron, dataset.testingData);
                            admissionsSim.convergedFrames = 0;
                            break;
                        }
                    }
                }
            } else {
                admissionsSim.convergedFrames++;
                if (admissionsSim.convergedFrames > 240) {
                    admissionsSim = createAdmissionsSim();
                }
            }
        }

        function drawIntroNetwork() {
            clearCanvas();
            setStats([
                { label: "Inputs", value: "3", color: "var(--accent-pink)" },
                { label: "Model", value: "Perceptron", color: "var(--accent-teal)" },
                { label: "Output", value: "+1 / -1", color: "var(--accent-blue)" }
            ]);

            const leftX = W * 0.18;
            const centerX = W * 0.55;
            const rightX = W * 0.82;
            const topY = H * 0.26;
            const midY = H * 0.5;
            const bottomY = H * 0.74;
            const pulse = (slideFrame % 180) / 180;

            drawSignal(leftX, topY, centerX, midY - 90, pulse, "#f472b6");
            drawSignal(leftX, midY, centerX, midY, (pulse + 0.25) % 1, "#2dd4bf");
            drawSignal(leftX, bottomY, centerX, midY + 90, (pulse + 0.5) % 1, "#60a5fa");
            drawSignal(centerX + 44, midY, rightX - 46, midY, (pulse + 0.15) % 1, "#f8fafc");

            drawNode(leftX, topY, 34, "Exam 1", "score", "rgba(244,114,182,0.85)");
            drawNode(leftX, midY, 34, "Exam 2", "score", "rgba(45,212,191,0.85)");
            drawNode(leftX, bottomY, 34, "Bias", "always 1", "rgba(96,165,250,0.85)");
            drawNode(centerX, midY, 52, "Neuron", "weighted sum", "rgba(236,72,153,0.9)");
            drawNode(rightX, midY, 40, "Output", "+1 or -1", "rgba(20,184,166,0.9)");

            ctx.fillStyle = "rgba(226,232,240,0.88)";
            ctx.font = "600 20px Inter";
            ctx.textAlign = "center";
            ctx.fillText("One artificial neuron can already make a classification decision.", W / 2, H - 34);
        }

        function drawPerceptronAnatomy() {
            clearCanvas();
            const sampleData = getSampleStudent();
            const student = sampleData.student;
            const weights = referencePerceptron.weights;
            const inputs = [student.x, student.y, 1];

            ];

            for (let i = 0; i < inputBoxes.length; i++) {

            ctx.textAlign = "center";

        function drawWeightedSum() {
            clearCanvas();
            const sampleData = getSampleStudent();
            const student = sampleData.student;
            const weights = referencePerceptron.weights;
            const inputs = [student.x, student.y, 1];
            const contributions = inputs.map((value, i) => value * weights[i]);
            const sum = contributions[0] + contributions[1] + contributions[2];
            const guess = sum >= 0 ? 1 : -1;

            setStats([
                { label: "Sum", value: signed(sum, 3), color: "var(--accent-pink)" },
                { label: "Activation", value: guess === 1 ? "+1" : "-1", color: "var(--accent-teal)" },
                { label: "Bias", value: signed(weights[2], 2), color: "var(--accent-blue)" }
            ]);

            const rows = [
                { label: "Exam 1", input: student.x, weight: weights[0], contribution: contributions[0], y: 120, color: "#f472b6" },
                { label: "Exam 2", input: student.y, weight: weights[1], contribution: contributions[1], y: 210, color: "#2dd4bf" },
                { label: "Bias", input: 1, weight: weights[2], contribution: contributions[2], y: 300, color: "#60a5fa" }
            ];

            for (const row of rows) {
                drawRoundedRect(48, row.y - 32, W * 0.58, 62, 14, "rgba(15,23,42,0.45)", "rgba(255,255,255,0.08)", 1);
                ctx.textAlign = "left";
                ctx.fillStyle = row.color;
                ctx.font = "600 14px Inter";
                ctx.fillText(row.label, 68, row.y - 6);
                ctx.fillStyle = "#e2e8f0";
                ctx.font = "13px JetBrains Mono";
                ctx.fillText(signed(row.input, 2) + " x " + signed(row.weight, 2) + " = " + signed(row.contribution, 3), 68, row.y + 18);

                const barX = W * 0.48;
                const barW = W * 0.16;
                const magnitude = clamp(Math.abs(row.contribution), 0, 1) * barW;
                ctx.fillStyle = "rgba(255,255,255,0.08)";
                ctx.fillRect(barX, row.y - 10, barW, 20);
                ctx.fillStyle = row.color;
                if (row.contribution >= 0) {
                    ctx.fillRect(barX + barW / 2, row.y - 10, magnitude, 20);
                } else {
                    ctx.fillRect(barX + barW / 2 - magnitude, row.y - 10, magnitude, 20);
                }
                ctx.strokeStyle = "rgba(255,255,255,0.18)";
                ctx.beginPath();
                ctx.moveTo(barX + barW / 2, row.y - 14);
                ctx.lineTo(barX + barW / 2, row.y + 14);
                ctx.stroke();
            }

            drawRoundedRect(W * 0.7, 134, W * 0.22, 110, 18, "rgba(236,72,153,0.12)", "rgba(236,72,153,0.24)", 1.5);
            ctx.textAlign = "center";
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 15px Inter";
            ctx.fillText("Weighted Sum", W * 0.81, 165);
            ctx.font = "700 28px JetBrains Mono";
            ctx.fillText(signed(sum, 2), W * 0.81, 208);

            drawArrow(W * 0.81, 250, W * 0.81, 308, "rgba(255,255,255,0.34)", 2);

            drawRoundedRect(W * 0.7, 326, W * 0.22, 112, 18, guess === 1 ? "rgba(20,184,166,0.16)" : "rgba(244,63,94,0.16)", "rgba(255,255,255,0.12)", 1.5);
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 15px Inter";
            ctx.fillText("Activation", W * 0.81, 358);
            ctx.font = "700 28px Inter";
            ctx.fillText(labelFor(guess), W * 0.81, 396);
            ctx.font = "13px JetBrains Mono";
            ctx.fillStyle = "rgba(226,232,240,0.82)";
            ctx.fillText(guess === 1 ? "sum >= 0 -> +1" : "sum < 0 -> -1", W * 0.81, 420);
        }

        function drawLearningStep() {
            clearCanvas();
            if (slideFrame === 1 || slideFrame % 70 === 0) {
                stepLearningPreview(learningPreview);
            }

            const before = learningPreview.beforeWeights;
            const after = learningPreview.afterWeights;
            const example = learningPreview.example;

            setStats([
                { label: "Guess", value: labelFor(learningPreview.guess), color: "var(--accent-pink)" },
                { label: "Target", value: labelFor(learningPreview.target), color: "var(--accent-teal)" },
                { label: "Error", value: learningPreview.error.toString(), color: "var(--accent-blue)" }
            ]);

            drawRoundedRect(48, 44, W - 96, 90, 18, "rgba(15,23,42,0.44)", "rgba(255,255,255,0.08)", 1);
            ctx.textAlign = "left";
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 16px Inter";
            ctx.fillText("Current training example", 72, 76);
            ctx.font = "13px JetBrains Mono";
            ctx.fillStyle = "rgba(226,232,240,0.82)";
            ctx.fillText("Exam 1 = " + example.exam1 + "   Exam 2 = " + example.exam2 + "   Target = " + labelFor(example.label), 72, 104);
            ctx.fillText("Update rule: weight += error * input * learningRate", 72, 126);

            const names = ["w0", "w1", "wBias"];
            const colors = ["#f472b6", "#2dd4bf", "#60a5fa"];
            for (let i = 0; i < 3; i++) {
                const x = 96 + i * 170;
                drawRoundedRect(x, 180, 120, 220, 18, "rgba(15,23,42,0.44)", "rgba(255,255,255,0.08)", 1);
                ctx.textAlign = "center";
                ctx.fillStyle = colors[i];
                ctx.font = "600 15px Inter";
                ctx.fillText(names[i], x + 60, 210);
                ctx.fillStyle = "#e2e8f0";
                ctx.font = "12px JetBrains Mono";
                ctx.fillText("before", x + 60, 238);
                ctx.font = "700 20px JetBrains Mono";
                ctx.fillText(signed(before[i], 2), x + 60, 270);
                ctx.font = "16px Inter";
                ctx.fillText("->", x + 60, 306);
                ctx.font = "12px JetBrains Mono";
                ctx.fillStyle = "rgba(226,232,240,0.8)";
                ctx.fillText("after", x + 60, 334);
                ctx.font = "700 20px JetBrains Mono";
                ctx.fillStyle = "#f8fafc";
                ctx.fillText(signed(after[i], 2), x + 60, 366);
            }

            drawRoundedRect(W * 0.72, 190, W * 0.18, 200, 18, learningPreview.error === 0 ? "rgba(20,184,166,0.14)" : "rgba(236,72,153,0.14)", "rgba(255,255,255,0.08)", 1);
            ctx.textAlign = "center";
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 16px Inter";
            ctx.fillText("Teacher Feedback", W * 0.81, 224);
            ctx.font = "13px JetBrains Mono";
            ctx.fillStyle = "rgba(226,232,240,0.82)";
            ctx.fillText("guess  = " + labelFor(learningPreview.guess), W * 0.81, 266);
            ctx.fillText("target = " + labelFor(learningPreview.target), W * 0.81, 294);
            ctx.fillText("error  = " + learningPreview.error, W * 0.81, 322);
            ctx.font = "12px Inter";
            ctx.fillStyle = "rgba(226,232,240,0.72)";
            ctx.fillText(learningPreview.error === 0 ? "No update needed." : "Wrong guess -> weights are nudged.", W * 0.81, 356);
        }

        function drawTrainTestSplit() {
            clearCanvas();
            setStats([
                { label: "Train", value: "32", color: "var(--accent-pink)" },
                { label: "Test", value: "8", color: "var(--accent-teal)" },
                { label: "Goal", value: "Generalize", color: "var(--accent-blue)" }
            ]);

            const plot = getPlotRect();
            drawPlotAxes(plot);
            drawLegend(plot);

            for (const row of dataset.trainingData) {
                drawStudentPoint(row, plot, false, "rgba(255,255,255,0.78)", row.label === 1 ? "rgba(56,189,248,0.9)" : "rgba(251,146,60,0.9)", 13, 1.5);
            }
            for (const row of dataset.testingData) {
                drawStudentPoint(row, plot, true, "rgba(255,255,255,0.9)", row.label === 1 ? "rgba(56,189,248,0.92)" : "rgba(251,146,60,0.92)", 13, 1.8);
            }

            drawRoundedRect(plot.right - 158, plot.top + 18, 136, 72, 16, "rgba(15,23,42,0.76)", "rgba(255,255,255,0.08)", 1);
            ctx.textAlign = "left";
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 14px Inter";
            ctx.fillText("Split Summary", plot.right - 138, plot.top + 42);
            ctx.font = "12px JetBrains Mono";
            ctx.fillStyle = "rgba(226,232,240,0.82)";
            ctx.fillText("train = 16 + 16", plot.right - 138, plot.top + 64);
            ctx.fillText("test  =  4 +  4", plot.right - 138, plot.top + 82);
        }

        function drawAdmissionsTraining() {
            clearCanvas();
            updateAdmissionsTraining(6);

            setStats([
                { label: "Trained", value: admissionsSim.trained.toString(), color: "var(--accent-pink)" },
                { label: "Train Acc", value: (admissionsSim.trainAccuracy * 100).toFixed(1) + "%", color: "var(--accent-teal)" },
                { label: "Test Acc", value: admissionsSim.converged ? Math.round(admissionsSim.testAccuracy * 100) + "%" : "--", color: "var(--accent-blue)" }
            ]);

            const plot = getPlotRect();
            drawPlotAxes(plot);
            drawDecisionGrid(admissionsSim, plot);
            drawDecisionBoundary(admissionsSim.perceptron.weights, plot);

            for (const row of dataset.trainingData) {
                const correct = admissionsSim.perceptron.feedforward([row.x, row.y, 1]) === row.label;
                drawStudentPoint(row, plot, false, correct ? "rgba(74,222,128,0.95)" : "rgba(248,113,113,0.96)", row.label === 1 ? "rgba(56,189,248,0.95)" : "rgba(251,146,60,0.95)", 14, correct ? 1.6 : 3);
            }

            for (const row of dataset.testingData) {
                const correct = admissionsSim.perceptron.feedforward([row.x, row.y, 1]) === row.label;
                drawStudentPoint(row, plot, true, correct ? "rgba(74,222,128,0.95)" : "rgba(248,113,113,0.96)", row.label === 1 ? "rgba(56,189,248,0.95)" : "rgba(251,146,60,0.95)", 14, correct ? 2 : 3.5);
            }

            drawLegend(plot);

            drawRoundedRect(plot.left, plot.bottom + 18, plot.right - plot.left, 46, 14, "rgba(15,23,42,0.82)", "rgba(255,255,255,0.08)", 1);
            ctx.textAlign = "left";
            ctx.font = "13px JetBrains Mono";
            ctx.fillStyle = admissionsSim.converged ? "#86efac" : "rgba(226,232,240,0.82)";
            const message = admissionsSim.converged
                ? "CONVERGED: training = 100%  |  hidden test = " + Math.round(admissionsSim.testAccuracy * 100) + "%"
                : "Training on 32 students only... hidden test set stays untouched.";
            ctx.fillText(message, plot.left + 16, plot.bottom + 47);

            if (admissionsSim.converged) {
                drawPill(plot.right - 174, plot.top + 18, "click to restart", "rgba(236,72,153,0.18)", "#fbcfe8");
            }
        }

        function drawPerceptronCodeFlow() {
            clearCanvas();
            const weights = referencePerceptron.weights;

            setStats([
                { label: "w0", value: signed(weights[0], 2), color: "var(--accent-pink)" },
                { label: "w1", value: signed(weights[1], 2), color: "var(--accent-teal)" },
                { label: "wBias", value: signed(weights[2], 2), color: "var(--accent-blue)" }
            ]);

            const cards = [
                {
                    x: 44,
                    title: "1. feedforward()",
                    lines: ["read inputs", "multiply by weights", "add everything"],
                    color: "rgba(236,72,153,0.16)"
                },
                {
                    x: W * 0.36,
                    title: "2. activate()",
                    lines: ["if sum >= 0 -> +1", "else -> -1", "binary decision"],
                    color: "rgba(20,184,166,0.16)"
                },
                {
                    x: W * 0.68,
                    title: "3. train()",
                    lines: ["guess", "compare to target", "update weights"],
                    color: "rgba(59,130,246,0.16)"
                }
            ];

            for (const card of cards) {
                drawRoundedRect(card.x, 120, W * 0.24, 210, 18, card.color, "rgba(255,255,255,0.12)", 1);
                ctx.textAlign = "left";
                ctx.fillStyle = "#f8fafc";
                ctx.font = "600 16px Inter";
                ctx.fillText(card.title, card.x + 20, 154);
                ctx.font = "13px JetBrains Mono";
                ctx.fillStyle = "rgba(226,232,240,0.82)";
                for (let i = 0; i < card.lines.length; i++) {
                    ctx.fillText(card.lines[i], card.x + 20, 196 + i * 30);
                }
            }

            drawArrow(W * 0.29, 226, W * 0.36, 226, "rgba(255,255,255,0.35)", 2);
            drawArrow(W * 0.61, 226, W * 0.68, 226, "rgba(255,255,255,0.35)", 2);

            drawRoundedRect(48, H - 130, W - 96, 78, 18, "rgba(15,23,42,0.52)", "rgba(255,255,255,0.08)", 1);
            ctx.textAlign = "center";
            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 16px Inter";
            ctx.fillText("The whole model fits in one class because the core idea is simple.", W / 2, H - 94);
            ctx.font = "13px JetBrains Mono";
            ctx.fillStyle = "rgba(226,232,240,0.82)";
            ctx.fillText("weights -> sum -> sign -> error -> updated weights", W / 2, H - 66);
        }

        function drawPerceptronLimit() {
            clearCanvas();
            setStats([
                { label: "Boundary", value: "1 line", color: "var(--accent-pink)" },
                { label: "Works", value: "Linear split", color: "var(--accent-teal)" },
                { label: "Fails", value: "XOR", color: "var(--accent-blue)" }
            ]);

            const leftPlot = { left: 40, right: W * 0.47, top: 56, bottom: H - 86 };
            const rightPlot = { left: W * 0.53, right: W - 40, top: 56, bottom: H - 86 };
            drawPlotAxes(leftPlot);
            drawPlotAxes(rightPlot);

            ctx.fillStyle = "#f8fafc";
            ctx.font = "600 16px Inter";
            ctx.textAlign = "center";
            ctx.fillText("Linearly Separable", (leftPlot.left + leftPlot.right) / 2, 34);
            ctx.fillText("XOR", (rightPlot.left + rightPlot.right) / 2, 34);

            const linearAdmit = [
                { exam1: 72, exam2: 78 }, { exam1: 80, exam2: 70 }, { exam1: 86, exam2: 64 }, { exam1: 68, exam2: 84 }
            ];
            const linearReject = [
                { exam1: 36, exam2: 42 }, { exam1: 28, exam2: 56 }, { exam1: 52, exam2: 34 }, { exam1: 42, exam2: 46 }
            ];

            for (const row of linearAdmit) {
                drawStudentPoint(row, leftPlot, false, "rgba(255,255,255,0.78)", "rgba(56,189,248,0.95)", 14, 1.6);
            }
            for (const row of linearReject) {
                drawStudentPoint(row, leftPlot, false, "rgba(255,255,255,0.78)", "rgba(251,146,60,0.95)", 14, 1.6);
            }
            ctx.strokeStyle = "rgba(255,255,255,0.88)";
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 6]);
            ctx.beginPath();
            ctx.moveTo(plotX(54, leftPlot), plotY(90, leftPlot));
            ctx.lineTo(plotX(70, leftPlot), plotY(18, leftPlot));
            ctx.stroke();
            ctx.setLineDash([]);
            drawPill(leftPlot.left + 18, leftPlot.top + 16, "one line works", "rgba(20,184,166,0.18)", "#99f6e4");

            const xorBlue = [
                { exam1: 28, exam2: 28 }, { exam1: 74, exam2: 74 }
            ];
            const xorOrange = [
                { exam1: 28, exam2: 74 }, { exam1: 74, exam2: 28 }
            ];
            for (const row of xorBlue) {
                drawStudentPoint(row, rightPlot, false, "rgba(255,255,255,0.78)", "rgba(56,189,248,0.95)", 16, 1.8);
            }
            for (const row of xorOrange) {
                drawStudentPoint(row, rightPlot, false, "rgba(255,255,255,0.78)", "rgba(251,146,60,0.95)", 16, 1.8);
            }
            ctx.strokeStyle = "rgba(255,255,255,0.65)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(plotX(44, rightPlot), plotY(92, rightPlot));
            ctx.lineTo(plotX(58, rightPlot), plotY(12, rightPlot));
            ctx.stroke();
            ctx.font = "700 44px Inter";
            ctx.fillStyle = "rgba(248,113,113,0.9)";
            ctx.fillText("X", (rightPlot.left + rightPlot.right) / 2, H * 0.58);
            drawPill(rightPlot.left + 18, rightPlot.top + 16, "one line fails", "rgba(244,63,94,0.16)", "#fecdd3");
        }

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            W = canvas.width = rect.width;
            H = canvas.height = rect.height;
            slideFrame = 0;
        }

        function resetSlideState() {
            slideFrame = 0;
            referencePerceptron = createReferencePerceptron();
            admissionsSim = createAdmissionsSim();
            learningPreview = createLearningPreview();
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                resetSlideState();
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                resetSlideState();
                updateUI();
            }
        }

        function goToSlide(index) {
            currentSlide = index;
            resetSlideState();
            updateUI();
        }

        function updateUI() {
            const slide = slides[currentSlide];
            document.getElementById("slideNumber").textContent = slide.number;
            document.getElementById("slideTitle").textContent = slide.title;
            document.getElementById("slideContent").innerHTML = slide.content;
            document.getElementById("canvasTitle").textContent = slide.canvasTitle;
            document.getElementById("canvasHint").innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4M12 8h.01" /></svg>' + slide.hint;
            document.getElementById("overlayText").textContent = slide.overlay;
            document.getElementById("progressText").textContent = (currentSlide + 1) + " / " + slides.length;
            document.getElementById("progressFill").style.width = (((currentSlide + 1) / slides.length) * 100) + "%";
            document.getElementById("btnPrev").disabled = currentSlide === 0;
            document.getElementById("btnNext").disabled = currentSlide === slides.length - 1;
            document.querySelectorAll(".slide-dot").forEach((dot, index) => {
                dot.classList.remove("active", "completed");
                if (index === currentSlide) {
                    dot.classList.add("active");
                } else if (index < currentSlide) {
                    dot.classList.add("completed");
                }
            });
        }

        function generateDots() {
            const container = document.getElementById("slideDots");
            container.innerHTML = "";
            for (let i = 0; i < slides.length; i++) {
                const dot = document.createElement("button");
                dot.className = "slide-dot" + (i === 0 ? " active" : "");
                dot.setAttribute("aria-label", "Go to slide " + (i + 1));
                dot.onclick = () => goToSlide(i);
                container.appendChild(dot);
            }
        }

        function animate() {
            slideFrame++;
            slides[currentSlide].draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener("resize", resize);
        canvas.addEventListener("click", () => {
            if (currentSlide === 5) {
                admissionsSim = createAdmissionsSim();
            }
        });

        function init() {
            resize();
            generateDots();
            updateUI();
            animate();
        }

        init();
    </script>
</body>
