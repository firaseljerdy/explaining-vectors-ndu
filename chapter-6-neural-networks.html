    <footer style="text-align:center; padding:20px 32px; border-top:1px solid var(--border-light); background:var(--bg-white);">
        <p style="font-size:12px; color:var(--text-muted);">By <strong style="color:var(--text-secondary);">Firas El Jerdy</strong> &middot; CSC 375, NDU &middot; Last updated: February 24, 2026</p>

    <script>
    const TWO_PI = Math.PI * 2;
    const PI = Math.PI;
    const HALF_PI = Math.PI / 2;

    // ============ PERCEPTRON CLASS ============
    class Perceptron {
        constructor(n, lr) {
            this.weights = [];
            this.lr = lr;
            for (let i = 0; i < n; i++) this.weights[i] = Math.random() * 2 - 1;
        }
        feedforward(inputs) {
            let sum = 0;
            for (let i = 0; i < this.weights.length; i++) sum += inputs[i] * this.weights[i];
            return sum >= 0 ? 1 : -1;
        }
        getSum(inputs) {
            let sum = 0;
            for (let i = 0; i < this.weights.length; i++) sum += inputs[i] * this.weights[i];
            return sum;
        }
        train(inputs, target) {
            let guess = this.feedforward(inputs);
            let error = target - guess;
            for (let i = 0; i < this.weights.length; i++) this.weights[i] += error * inputs[i] * this.lr;
            return error;
        }
    }

    // ============ DATA ============
    const rawAdmitted = [[85,75],[72,80],[90,65],[60,85],[78,70],[88,60],[65,90],[70,75],[80,72],[75,78],[82,68],[68,82],[92,58],[55,88],[77,73],[85,62],[73,77],[95,55],[62,80],[80,80]];
    const rawRejected = [[45,50],[30,60],[50,40],[35,55],[40,45],[55,35],[25,65],[48,42],[38,52],[42,48],[50,30],[60,25],[33,58],[28,50],[52,38],[20,55],[45,40],[35,45],[55,30],[40,35]];

    let trainingData = [], testingData = [], bgTestPoints = [];
    let perceptron, demoPerceptron;
    let trainIndex = 0, trained = 0, converged = false;
    let trainAccuracy = 0, testAccuracy = 0;
    let demoTrainIdx = 0, demoTrained = 0, demoData = [], demoConverged = false, demoAccuracy = 0;

    function initData() {
        trainingData = []; testingData = []; bgTestPoints = [];
        function proc(arr, start, end, label, target) {
            for (let i = start; i < end; i++) {
                let r = arr[i];
                target.push({ e1: r[0], e2: r[1], x: mapVal(r[0], 0, 100, -1, 1), y: mapVal(r[1], 0, 100, -1, 1), label: label });
            }
        }
        proc(rawAdmitted, 0, 16, 1, trainingData);
        proc(rawRejected, 0, 16, -1, trainingData);
        proc(rawAdmitted, 16, 20, 1, testingData);
        proc(rawRejected, 16, 20, -1, testingData);
        for (let px = 0; px <= 100; px += 4) {
            for (let py = 0; py <= 100; py += 4) {
                bgTestPoints.push({ e1: px, e2: py, x: mapVal(px, 0, 100, -1, 1), y: mapVal(py, 0, 100, -1, 1) });
            }
        }
        perceptron = new Perceptron(3, 0.01);
        trainIndex = 0; trained = 0; converged = false; trainAccuracy = 0; testAccuracy = 0;

        demoData = [];
        for (let i = 0; i < 30; i++) {
            let x = Math.random() * 2 - 1, y = Math.random() * 2 - 1;
            demoData.push({ x, y, label: (y > 0.5 * x + 0.1) ? 1 : -1 });
        }
        demoPerceptron = new Perceptron(3, 0.01);
        demoTrainIdx = 0; demoTrained = 0; demoConverged = false; demoAccuracy = 0;
    }

    // ============ SLIDE DATA ============
    const slides = [
        { number:"SLIDE 01", title:"What Is a Neural Network?", canvasTitle:"Biological → Artificial", hint:"Watch signals flow through the neuron", overlay:"Inputs × Weights → Sum → Activation → Output",
            content:`<p class="slide-text">The human brain contains roughly <strong>100 billion neurons</strong>, each connected to thousands of others. These biological neurons receive electrical signals, process them, and fire their own signals onward. Neural networks are computational models <em>inspired</em> by this biology.</p>
            <p class="slide-text">An <strong>artificial neural network</strong> takes the core idea—nodes connected by weighted pathways—and turns it into math a computer can execute. The simplest possible network is a single neuron: the <strong>perceptron</strong>.</p>
            <div class="highlight-box"><h4>The Core Idea</h4><p>A neuron receives inputs, multiplies each by a weight, sums them, and passes the result through an activation function to produce an output. That's it—every neural network, from a single perceptron to ChatGPT, is built from this building block.</p></div>`,
            draw: drawNeuronDiagram },

        { number:"SLIDE 02", title:"The Perceptron", canvasTitle:"Perceptron Architecture", hint:"Watch the signal path light up", overlay:"Invented by Frank Rosenblatt, 1957",
            content:`<p class="slide-text">Invented in 1957 by <strong>Frank Rosenblatt</strong>, a perceptron takes multiple inputs (each multiplied by a weight), sums the weighted inputs, and passes the sum through an <strong>activation function</strong> to produce a single output.</p>
            <p class="slide-text">We also add a <strong>bias</strong> input—an extra input that's always 1, with its own weight. The bias lets the perceptron shift its decision boundary away from the origin, so it can classify the point (0, 0) correctly.</p>
            <div class="code-block"><pre><span class="kw">class</span> <span class="fn">Perceptron</span> {
  <span class="fn">constructor</span>(numInputs, learningRate) {
    <span class="kw">this</span>.<span class="prop">weights</span> = [];
    <span class="kw">this</span>.<span class="prop">lr</span> = learningRate;
    <span class="kw">for</span> (<span class="kw">let</span> i = <span class="num">0</span>; i < numInputs; i++)
      <span class="kw">this</span>.<span class="prop">weights</span>[i] = <span class="fn">random</span>(<span class="num">-1</span>, <span class="num">1</span>);
  }
}</pre></div>
            <div class="highlight-box"><h4>3 Inputs for 2D Classification</h4><p><strong>x₁</strong> = first feature, <strong>x₂</strong> = second feature, <strong>bias = 1</strong>. The weights start random—the perceptron has to <em>learn</em> the right values.</p></div>`,
            draw: drawPerceptronDiagram },

        { number:"SLIDE 03", title:"Feedforward: Making a Guess", canvasTitle:"Numbers Flow Through", hint:"Move mouse to change input values", overlay:"sum = Σ(input × weight) → sign(sum)",
            content:`<p class="slide-text"><strong>Feedforward</strong> is the process of computing the output from the inputs. For each input, multiply it by its weight. Sum all the weighted inputs. Pass the sum through the activation function.</p>
            <div class="formula-box"><div class="formula"><span class="var">output</span> <span class="op">=</span> sign( <span class="var">x₁</span>·<span class="var">w₁</span> + <span class="var">x₂</span>·<span class="var">w₂</span> + <span class="var">1</span>·<span class="var">w<sub>b</sub></span> )</div></div>
            <div class="code-block"><pre><span class="fn">feedforward</span>(inputs) {
  <span class="kw">let</span> sum = <span class="num">0</span>;
  <span class="kw">for</span> (<span class="kw">let</span> i = <span class="num">0</span>; i < <span class="kw">this</span>.<span class="prop">weights</span>.length; i++)
    sum += inputs[i] * <span class="kw">this</span>.<span class="prop">weights</span>[i];
  <span class="kw">return</span> <span class="kw">this</span>.<span class="fn">activate</span>(sum);
}</pre></div>
            <p class="slide-text">The demo on the right maps your mouse position to input values and runs them through a perceptron in real time. Watch the weighted sum and output change as you move.</p>`,
            draw: drawFeedforward },

        { number:"SLIDE 04", title:"The Sign Activation Function", canvasTitle:"Step Function Graph", hint:"Watch the marker trace the function", overlay:"sum ≥ 0 → fire (+1), sum < 0 → don't fire (−1)",
            content:`<p class="slide-text">The activation function decides whether the neuron "fires." Our perceptron uses the simplest possible activation: the <strong>sign function</strong>.</p>
            <div class="formula-box"><div class="formula">sign(<span class="var">sum</span>) <span class="op">=</span> <span class="var">sum</span> ≥ 0 ? <span class="var">+1</span> : <span class="var">−1</span></div></div>
            <p class="slide-text">If the weighted sum is positive (or zero), the perceptron outputs <strong>+1</strong> (fire). If negative, it outputs <strong>−1</strong> (don't fire). This binary output classifies the input into one of two categories.</p>
            <div class="code-block"><pre><span class="fn">activate</span>(sum) {
  <span class="kw">if</span> (sum >= <span class="num">0</span>) <span class="kw">return</span>  <span class="num">1</span>;
  <span class="kw">else</span>           <span class="kw">return</span> <span class="num">-1</span>;
}</pre></div>
            <div class="highlight-box"><h4>Why Not Something Fancier?</h4><p>Real-world neural networks use smooth activation functions like sigmoid or ReLU. But for a single perceptron doing binary classification, the sign function is all we need. Fire or don't fire—just like a biological neuron.</p></div>`,
            draw: drawActivation },

        { number:"SLIDE 05", title:"Training: Learning from Mistakes", canvasTitle:"Error → Weight Adjustment", hint:"Watch the perceptron correct itself", overlay:"error = desired − guess → adjust weights",
            content:`<p class="slide-text"><strong>Supervised learning</strong>: we show the perceptron inputs with <em>known</em> answers. It guesses, checks, and adjusts. The error is simply the difference between the desired answer and the guess.</p>
            <div class="formula-box"><div class="formula"><span class="var">error</span> <span class="op">=</span> <span class="var">desired</span> <span class="op">−</span> <span class="var">guess</span></div></div>
            <p class="slide-text">Since both desired and guess are +1 or −1, the error can only be <strong>0</strong> (correct), <strong>+2</strong> (should be +1, guessed −1), or <strong>−2</strong> (should be −1, guessed +1). Then we nudge each weight:</p>
            <div class="code-block"><pre><span class="fn">train</span>(inputs, target) {
  <span class="kw">let</span> guess = <span class="kw">this</span>.<span class="fn">feedforward</span>(inputs);
  <span class="kw">let</span> error = target - guess;
  <span class="kw">for</span> (<span class="kw">let</span> i = <span class="num">0</span>; i < <span class="kw">this</span>.<span class="prop">weights</span>.length; i++)
    <span class="kw">this</span>.<span class="prop">weights</span>[i] += error * inputs[i] * <span class="kw">this</span>.<span class="prop">lr</span>;
}</pre></div>
            <div class="highlight-box"><h4>The Learning Rate</h4><p>The learning rate (0.01 in our code) controls how big each adjustment is. Too high = overshooting. Too low = slow learning. It's the same trade-off as max steering force from Chapter 5.</p></div>`,
            draw: drawTraining },

        { number:"SLIDE 06", title:"The Decision Boundary", canvasTitle:"Line Converges to Separate Data", hint:"Watch the perceptron find the line", overlay:"The perceptron learns a line that separates two classes",
            content:`<p class="slide-text">What is the perceptron actually learning? It's finding a <strong>line</strong> (called a decision boundary) that separates the two classes. Points on one side → +1, points on the other → −1.</p>
            <p class="slide-text">The weights <em>define</em> this line. As training adjusts the weights, the line rotates and shifts until it correctly separates the data. The demo trains a perceptron on random data in real time—watch the green line converge.</p>
            <div class="highlight-box"><h4>Linear Separability</h4><p>A perceptron can only solve <strong>linearly separable</strong> problems—ones where a straight line can divide the data. For more complex patterns (like XOR), you need multiple layers of neurons. But for our admissions classifier, a line is exactly what we need.</p></div>
            <p class="slide-text">The decision boundary equation comes directly from the weights: <code>w₀·x + w₁·y + w₂·1 = 0</code>, which rearranges to <code>y = -(w₀/w₁)·x - (w₂/w₁)</code>.</p>`,
            draw: drawDecisionBoundary },

        { number:"SLIDE 07", title:"Train / Test Split", canvasTitle:"80% Train · 20% Test", hint:"Circles = train, Squares = test", overlay:"Never test on what you trained on",
            content:`<p class="slide-text">If we test the perceptron on the <em>same</em> data it was trained on, it might just be memorizing—not actually learning patterns. That's called <strong>overfitting</strong>.</p>

<span class="cm">// 20% Test (4 of each class)</span>

        { number:"SLIDE 08", title:"Class Demo: University Admissions", canvasTitle:"Live Admissions Classifier", hint:"Watch the perceptron train live", overlay:"32 train (●) + 8 test (■) → decision boundary",
            content:`<p class="slide-text">This is the complete exercise from class. Two exam scores per student, 40 students total. <strong>Blue</strong> = admitted, <strong>orange</strong> = rejected. The perceptron trains on 32 students and is tested on 8 unseen students.</p>
            <p class="slide-text">The background colors show the perceptron's current classification regions. The <strong>green line</strong> is the decision boundary. Training data is shown as <strong>circles</strong>, testing data as <strong>squares</strong>. Green outline = correctly classified, red outline = misclassified.</p>

    // ============ STATE ============
    let currentSlide = 0;
    let frame = 0;
    let mx = 0, my = 0;
    let ffWeights = [0.6, -0.4, 0.3];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    // ============ INIT ============
    function init() { resize(); initData(); updateUI(); generateDots(); animate(); }
    function resize() {
        const r = canvas.parentElement.getBoundingClientRect();
        W = canvas.width = r.width; H = canvas.height = r.height;
        resetSim();
    }
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', (e) => { const r = canvas.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; });

    function resetSim() {
        frame = 0;
        if (currentSlide === 5) {
            demoPerceptron = new Perceptron(3, 0.01);
            demoData = [];
            for (let i = 0; i < 30; i++) {
                let x = Math.random() * 2 - 1, y = Math.random() * 2 - 1;
                demoData.push({ x, y, label: (y > 0.5 * x + 0.1) ? 1 : -1 });
            }
            demoTrainIdx = 0; demoTrained = 0; demoConverged = false; demoAccuracy = 0;
        }
        if (currentSlide === 7) {
            perceptron = new Perceptron(3, 0.01);
            trainIndex = 0; trained = 0; converged = false; trainAccuracy = 0; testAccuracy = 0;
        }
    }

    // ============ NAVIGATION ============
    function nextSlide() { if (currentSlide < slides.length - 1) { currentSlide++; resetSim(); updateUI(); } }
    function prevSlide() { if (currentSlide > 0) { currentSlide--; resetSim(); updateUI(); } }
    function goToSlide(i) { currentSlide = i; resetSim(); updateUI(); }
    function updateUI() {
        const s = slides[currentSlide];
        document.getElementById('slideNumber').textContent = s.number;
        document.getElementById('slideTitle').textContent = s.title;
        document.getElementById('slideContent').innerHTML = s.content;
        document.getElementById('canvasTitle').textContent = s.canvasTitle;
        document.getElementById('canvasHint').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>${s.hint}`;
        document.getElementById('overlayText').textContent = s.overlay;
        document.getElementById('progressText').textContent = `${currentSlide + 1} / ${slides.length}`;
        document.getElementById('progressFill').style.width = `${((currentSlide + 1) / slides.length) * 100}%`;
        document.getElementById('btnPrev').disabled = currentSlide === 0;
        document.getElementById('btnNext').disabled = currentSlide === slides.length - 1;
        document.querySelectorAll('.slide-dot').forEach((d, i) => { d.classList.remove('active', 'completed'); if (i === currentSlide) d.classList.add('active'); else if (i < currentSlide) d.classList.add('completed'); });
    }
    function generateDots() { const c = document.getElementById('slideDots'); c.innerHTML = ''; slides.forEach((_, i) => { const d = document.createElement('div'); d.className = 'slide-dot' + (i === 0 ? ' active' : ''); d.onclick = () => goToSlide(i); c.appendChild(d); }); }

    // ============ DRAWING HELPERS ============
    function mapVal(v, a1, a2, b1, b2) { return b1 + ((v - a1) / (a2 - a1)) * (b2 - b1); }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function clearCanvas(bg = '#1e293b') { ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H); }
    function drawArrow(x1, y1, x2, y2, color, label, lw = 3) {
        const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx * dx + dy * dy); if (len < 2) return;
        const angle = Math.atan2(dy, dx), headLen = Math.min(10, len * 0.3);
        ctx.save(); ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = lw; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x2 - headLen * Math.cos(angle - PI / 6), y2 - headLen * Math.sin(angle - PI / 6)); ctx.lineTo(x2 - headLen * Math.cos(angle + PI / 6), y2 - headLen * Math.sin(angle + PI / 6)); ctx.closePath(); ctx.fill();
        if (label) { ctx.font = '600 11px Inter,sans-serif'; const lx = (x1 + x2) / 2, ly = (y1 + y2) / 2; const perpX = -Math.sin(angle) * 14, perpY = Math.cos(angle) * 14; ctx.fillText(label, lx + perpX, ly + perpY); }
        ctx.restore();
    }
    function updateStats(trained, accuracy, status) {
        document.getElementById('statTrained').textContent = trained;
        document.getElementById('statAccuracy').textContent = accuracy;
        document.getElementById('statStatus').textContent = status;
    }

    // ============ SLIDE 01: NEURON DIAGRAM ============
    function drawNeuronDiagram() {
        clearCanvas(); frame++;
        const cx = W / 2, cy = H / 2, r = Math.min(W, H) * 0.12;
        const pulse = (frame % 120) / 120;

        const inputs = [{ y: cy - r * 2.5, label: 'x₁' }, { y: cy, label: 'x₂' }, { y: cy + r * 2.5, label: 'bias' }];
        const inX = cx - W * 0.28, somaX = cx - W * 0.04, outX = cx + W * 0.28;

        inputs.forEach((inp, idx) => {
            ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(inX + 30, inp.y); ctx.lineTo(somaX - r, cy); ctx.stroke();

            const t = (pulse + idx * 0.25) % 1;
            const px = inX + 30 + (somaX - r - inX - 30) * t;
            const py = inp.y + (cy - inp.y) * t;
            const glow = Math.sin(t * PI) * 0.8;
            ctx.fillStyle = `rgba(16,185,129,${glow})`; ctx.beginPath(); ctx.arc(px, py, 5, 0, TWO_PI); ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(inX, inp.y, 16, 0, TWO_PI); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#1e293b'; ctx.font = '600 11px JetBrains Mono,monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(inp.label, inX, inp.y);

            ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '500 10px JetBrains Mono,monospace';
            ctx.fillText('w' + (idx + 1), (inX + 30 + somaX - r) / 2, (inp.y + cy) / 2 - 10);
        });

        ctx.fillStyle = 'rgba(16,185,129,0.3)'; ctx.strokeStyle = 'rgba(16,185,129,0.7)'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(somaX, cy, r, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 16px JetBrains Mono,monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Σ', somaX, cy);

        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(somaX + r, cy); ctx.lineTo(outX - 20, cy); ctx.stroke();

        const outPulse = (pulse + 0.75) % 1;
        const opx = somaX + r + (outX - 20 - somaX - r) * outPulse;
        const outGlow = Math.sin(outPulse * PI) * 0.8;
        ctx.fillStyle = `rgba(6,182,212,${outGlow})`; ctx.beginPath(); ctx.arc(opx, cy, 5, 0, TWO_PI); ctx.fill();

        ctx.fillStyle = 'rgba(6,182,212,0.5)'; ctx.strokeStyle = 'rgba(6,182,212,0.8)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(outX, cy, 18, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 12px JetBrains Mono,monospace';
        ctx.fillText('+1', outX, cy);

        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '500 11px Inter,sans-serif'; ctx.textBaseline = 'top';
        ctx.fillText('inputs', inX, cy + r * 3.2);
        ctx.fillText('weighted sum', somaX, cy + r + 20);
        ctx.fillText('output', outX, cy + 32);

        updateStats(0, '—', 'Diagram');
    }

    // ============ SLIDE 02: PERCEPTRON DIAGRAM ============
    function drawPerceptronDiagram() {
        clearCanvas(); frame++;
        const cx = W / 2, cy = H / 2;
        const phase = Math.floor(frame / 60) % 4;

        const inX = W * 0.12, sumX = W * 0.45, actX = W * 0.65, outX = W * 0.85;
        const nodes = [{ y: cy - H * 0.22, label: 'x₁', val: '0.7' }, { y: cy, label: 'x₂', val: '-0.3' }, { y: cy + H * 0.22, label: '1', val: 'bias' }];
        const wLabels = ['w₁', 'w₂', 'w_b'];

        nodes.forEach((n, i) => {
            const highlight = (phase === 0 || phase === i);
            ctx.strokeStyle = highlight ? 'rgba(16,185,129,0.5)' : 'rgba(255,255,255,0.08)';
            ctx.lineWidth = highlight ? 2 : 1;
            ctx.beginPath(); ctx.moveTo(inX + 22, n.y); ctx.lineTo(sumX - 22, cy); ctx.stroke();

            ctx.fillStyle = highlight ? 'rgba(16,185,129,0.15)' : 'rgba(255,255,255,0.08)';
            ctx.font = '500 10px JetBrains Mono,monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = highlight ? 'rgba(16,185,129,0.8)' : 'rgba(255,255,255,0.3)';
            ctx.fillText(wLabels[i], (inX + 22 + sumX - 22) / 2, (n.y + cy) / 2 - 10);

            ctx.fillStyle = highlight ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.4)';
            ctx.strokeStyle = highlight ? 'rgba(16,185,129,0.6)' : 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(inX, n.y, 20, 0, TWO_PI); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#1e293b'; ctx.font = '600 12px JetBrains Mono,monospace';
            ctx.fillText(n.label, inX, n.y);
        });

        ctx.strokeStyle = 'rgba(16,185,129,0.3)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(sumX + 22, cy); ctx.lineTo(actX - 22, cy); ctx.stroke();

        ctx.strokeStyle = 'rgba(6,182,212,0.3)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(actX + 22, cy); ctx.lineTo(outX - 22, cy); ctx.stroke();

        ctx.fillStyle = 'rgba(16,185,129,0.2)'; ctx.strokeStyle = 'rgba(16,185,129,0.6)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(sumX, cy, 22, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 16px JetBrains Mono,monospace'; ctx.textAlign = 'center';
        ctx.fillText('Σ', sumX, cy);

        ctx.fillStyle = 'rgba(249,115,22,0.15)'; ctx.strokeStyle = 'rgba(249,115,22,0.5)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(actX, cy, 22, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#f97316'; ctx.font = '600 11px JetBrains Mono,monospace';
        ctx.fillText('sign', actX, cy);

        ctx.fillStyle = 'rgba(6,182,212,0.3)'; ctx.strokeStyle = 'rgba(6,182,212,0.7)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(outX, cy, 22, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 14px JetBrains Mono,monospace';
        ctx.fillText('±1', outX, cy);

        ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '500 10px Inter,sans-serif'; ctx.textBaseline = 'top';
        ctx.textAlign = 'center';
        ctx.fillText('inputs', inX, cy + H * 0.3);
        ctx.fillText('sum', sumX, cy + 32);
        ctx.fillText('activate', actX, cy + 32);
        ctx.fillText('output', outX, cy + 32);

        updateStats(0, '—', 'Architecture');
    }

    // ============ SLIDE 03: FEEDFORWARD ============
    function drawFeedforward() {
        clearCanvas(); frame++;
        const x1 = mapVal(clamp(mx, 0, W), 0, W, -1, 1);
        const x2 = mapVal(clamp(my, 0, H), 0, H, -1, 1);
        const bias = 1;
        const w = ffWeights;

        const products = [x1 * w[0], x2 * w[1], bias * w[2]];
        const sum = products[0] + products[1] + products[2];
        const output = sum >= 0 ? +1 : -1;

        const startX = W * 0.05, midX = W * 0.5, endX = W * 0.88;
        const rows = [H * 0.2, H * 0.5, H * 0.8];

        const labels = [`x₁ = ${x1.toFixed(2)}`, `x₂ = ${x2.toFixed(2)}`, `bias = 1.00`];
        const wLabels = [`w₁ = ${w[0].toFixed(2)}`, `w₂ = ${w[1].toFixed(2)}`, `w_b = ${w[2].toFixed(2)}`];
        const pLabels = [products[0].toFixed(3), products[1].toFixed(3), products[2].toFixed(3)];

        rows.forEach((y, i) => {
            ctx.fillStyle = 'rgba(16,185,129,0.12)'; ctx.strokeStyle = 'rgba(16,185,129,0.4)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(startX + 30, y, 16, 0, TWO_PI); ctx.fill(); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '500 11px JetBrains Mono,monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(labels[i].split(' = ')[0], startX + 30, y);

            ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '500 10px JetBrains Mono,monospace'; ctx.textAlign = 'left';
            ctx.fillText(labels[i].split(' = ')[1], startX + 52, y);

            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(startX + 52, y + 6); ctx.lineTo(midX - 40, H / 2); ctx.stroke();

            ctx.fillStyle = 'rgba(249,115,22,0.7)'; ctx.font = '500 9px JetBrains Mono,monospace'; ctx.textAlign = 'center';
            ctx.fillText(wLabels[i], (startX + 50 + midX - 40) / 2, (y + H / 2) / 2 - 8);

            ctx.fillStyle = 'rgba(6,182,212,0.8)'; ctx.font = '600 11px JetBrains Mono,monospace';
            ctx.fillText(pLabels[i], midX - 60, y);
        });

        ctx.fillStyle = 'rgba(16,185,129,0.2)'; ctx.strokeStyle = 'rgba(16,185,129,0.6)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(midX, H / 2, 24, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 15px JetBrains Mono,monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('Σ', midX, H / 2);

        ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '600 12px JetBrains Mono,monospace'; ctx.textAlign = 'left';
        ctx.fillText(`sum = ${sum.toFixed(3)}`, midX + 34, H / 2 - 6);

        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(midX + 24, H / 2); ctx.lineTo(endX - 24, H / 2); ctx.stroke();

        const outCol = output === 1 ? '#10b981' : '#ef4444';
        ctx.fillStyle = outCol + '33'; ctx.strokeStyle = outCol; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(endX, H / 2, 26, 0, TWO_PI); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '700 18px JetBrains Mono,monospace'; ctx.textAlign = 'center';
        ctx.fillText(output > 0 ? '+1' : '−1', endX, H / 2);

        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '500 10px Inter,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('sign(' + sum.toFixed(2) + ') = ' + output, endX, H / 2 + 34);

        updateStats(0, '—', output > 0 ? 'Fire (+1)' : 'Don\'t fire (−1)');
    }

    // ============ SLIDE 04: ACTIVATION FUNCTION ============
    function drawActivation() {
        clearCanvas(); frame++;
        const plotL = W * 0.15, plotR = W * 0.85, plotT = H * 0.12, plotB = H * 0.88;
        const plotW = plotR - plotL, plotH = plotB - plotT;
        const midX = (plotL + plotR) / 2, midY = (plotT + plotB) / 2;

        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotL, midY); ctx.lineTo(plotR, midY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(midX, plotT); ctx.lineTo(midX, plotB); ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '500 11px JetBrains Mono,monospace'; ctx.textAlign = 'center';
        ctx.fillText('sum', plotR + 20, midY + 4);
        ctx.fillText('output', midX, plotT - 8);
        ctx.fillText('−3', plotL, midY + 16); ctx.fillText('+3', plotR, midY + 16);
        ctx.fillText('+1', midX - 20, plotT + plotH * 0.15); ctx.fillText('−1', midX - 20, plotB - plotH * 0.15);

        const yPlus1 = plotT + plotH * 0.15, yMinus1 = plotB - plotH * 0.15;
        ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(plotL, yMinus1); ctx.lineTo(midX, yMinus1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(midX, yPlus1); ctx.lineTo(plotR, yPlus1); ctx.stroke();

        ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.arc(midX, yPlus1, 5, 0, TWO_PI); ctx.fill();
        ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#10b981'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(midX, yMinus1, 5, 0, TWO_PI); ctx.fill(); ctx.stroke();

        const t = Math.sin(frame * 0.03) * 3;
        const markerX = mapVal(t, -3, 3, plotL, plotR);
        const markerY = t >= 0 ? yPlus1 : yMinus1;

        ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(markerX, midY); ctx.lineTo(markerX, markerY); ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(markerX, markerY, 7, 0, TWO_PI); ctx.fill();
        ctx.fillStyle = 'rgba(249,115,22,0.3)'; ctx.beginPath(); ctx.arc(markerX, midY, 5, 0, TWO_PI); ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '600 13px JetBrains Mono,monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(`sum = ${t.toFixed(2)}`, 16, 16);
        ctx.fillStyle = t >= 0 ? '#10b981' : '#ef4444';
        ctx.fillText(`output = ${t >= 0 ? '+1' : '−1'}`, 16, 36);

        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '500 10px Inter,sans-serif';
        ctx.fillText('● = included   ○ = excluded', 16, H - 20);

        updateStats(0, '—', 'Sign Function');
    }

    // ============ SLIDE 05: TRAINING ============
    function drawTraining() {
        clearCanvas(); frame++;
        const plotL = W * 0.1, plotR = W * 0.9, plotT = H * 0.1, plotB = H * 0.7;

        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotR, plotB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotL, plotT); ctx.stroke();

        const simpleData = [
            { x: 0.8, y: 0.7, label: 1 }, { x: 0.6, y: 0.9, label: 1 }, { x: 0.3, y: 0.8, label: 1 },
            { x: 0.7, y: 0.5, label: 1 }, { x: 0.9, y: 0.6, label: 1 }, { x: 0.4, y: 0.7, label: 1 },
            { x: 0.1, y: 0.2, label: -1 }, { x: 0.3, y: 0.1, label: -1 }, { x: 0.2, y: 0.4, label: -1 },
            { x: 0.5, y: 0.2, label: -1 }, { x: 0.4, y: 0.3, label: -1 }, { x: 0.6, y: 0.1, label: -1 }
        ];

        const step = Math.floor(frame / 40) % simpleData.length;
        const d = simpleData[step];
        const px = mapVal(d.x, 0, 1, plotL, plotR), py = mapVal(d.y, 0, 1, plotB, plotT);

        simpleData.forEach((p, i) => {
            const dpx = mapVal(p.x, 0, 1, plotL, plotR), dpy = mapVal(p.y, 0, 1, plotB, plotT);
            ctx.fillStyle = p.label === 1 ? 'rgba(100,200,255,0.5)' : 'rgba(255,150,80,0.5)';
            ctx.strokeStyle = i === step ? '#fff' : 'rgba(255,255,255,0.15)';
            ctx.lineWidth = i === step ? 3 : 1;
            ctx.beginPath(); ctx.arc(dpx, dpy, i === step ? 10 : 7, 0, TWO_PI); ctx.fill(); ctx.stroke();
        });

        const guess = d.y > (0.5 * d.x + 0.35) ? 1 : -1;
        const error = d.label - guess;
        const isCorrect = error === 0;

        const infoY = H * 0.78;
        ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 12px JetBrains Mono,monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(`Point: (${d.x.toFixed(1)}, ${d.y.toFixed(1)})`, 16, infoY);
        ctx.fillText(`Desired: ${d.label > 0 ? '+1' : '−1'}`, 16, infoY + 18);
        ctx.fillStyle = isCorrect ? '#10b981' : '#ef4444';
        ctx.fillText(`Guess: ${guess > 0 ? '+1' : '−1'}`, W * 0.35, infoY);
        ctx.fillText(`Error: ${error}`, W * 0.35, infoY + 18);
        ctx.fillStyle = isCorrect ? '#10b981' : '#f97316';
        ctx.fillText(isCorrect ? '✓ Correct — no adjustment' : '✗ Wrong — adjust weights!', W * 0.6, infoY + 9);

        if (!isCorrect) {
            const ringPhase = (frame % 40) / 40;
            ctx.strokeStyle = `rgba(239,68,68,${0.5 - ringPhase * 0.5})`;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(px, py, 10 + ringPhase * 20, 0, TWO_PI); ctx.stroke();
        }

        updateStats(step + 1, '—', isCorrect ? 'Correct' : 'Adjusting');
    }

    // ============ SLIDE 06: DECISION BOUNDARY ============
    function drawDecisionBoundary() {
        clearCanvas(); frame++;
        const plotL = W * 0.1, plotR = W * 0.9, plotT = H * 0.08, plotB = H * 0.82;

        if (!demoConverged && frame % 2 === 0) {
            let d = demoData[demoTrainIdx];
            demoPerceptron.train([d.x, d.y, 1], d.label);
            demoTrainIdx = (demoTrainIdx + 1) % demoData.length;
            demoTrained++;
            if (demoTrainIdx === 0) {
                let correct = 0;
                for (let dd of demoData) { if (demoPerceptron.feedforward([dd.x, dd.y, 1]) === dd.label) correct++; }
                demoAccuracy = correct / demoData.length;
                if (demoAccuracy >= 1.0) demoConverged = true;
            }
        }

        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotR, plotB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotL, plotT); ctx.stroke();

        let w = demoPerceptron.weights;
        if (w && w.length === 3 && Math.abs(w[1]) > 0.0001) {
            let m = -(w[0] / w[1]), b = -(w[2] / w[1]);
            let y1 = m * -1 + b, y2 = m * 1 + b;
            let lx1 = plotL, ly1 = mapVal(mapVal(y1, -1, 1, 0, 1), 0, 1, plotB, plotT);
            let lx2 = plotR, ly2 = mapVal(mapVal(y2, -1, 1, 0, 1), 0, 1, plotB, plotT);
            ctx.strokeStyle = 'rgba(16,185,129,0.7)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
        }

        for (let d of demoData) {
            let dpx = mapVal(d.x, -1, 1, plotL, plotR), dpy = mapVal(d.y, -1, 1, plotB, plotT);
            let correct = demoPerceptron.feedforward([d.x, d.y, 1]) === d.label;
            ctx.strokeStyle = correct ? 'rgba(16,185,129,0.6)' : 'rgba(239,68,68,0.8)';
            ctx.lineWidth = correct ? 1.5 : 2.5;
            ctx.fillStyle = d.label === 1 ? 'rgba(100,200,255,0.6)' : 'rgba(255,150,80,0.6)';
            ctx.beginPath(); ctx.arc(dpx, dpy, 7, 0, TWO_PI); ctx.fill(); ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '500 11px JetBrains Mono,monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(`trained: ${demoTrained}`, 16, H * 0.86);
        ctx.fillText(`accuracy: ${(demoAccuracy * 100).toFixed(0)}%`, 16, H * 0.86 + 16);
        if (demoConverged) { ctx.fillStyle = '#10b981'; ctx.fillText('CONVERGED ✓', W * 0.5, H * 0.86 + 8); }

        updateStats(demoTrained, (demoAccuracy * 100).toFixed(0) + '%', demoConverged ? 'Converged' : 'Training...');
    }

    // ============ SLIDE 07: TRAIN/TEST SPLIT ============
    function drawTrainTestSplit() {
        clearCanvas(); frame++;
        const plotL = W * 0.1, plotR = W * 0.9, plotT = H * 0.08, plotB = H * 0.8;

        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotR, plotB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotL, plotT); ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '500 10px Inter,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Exam 1 Score', (plotL + plotR) / 2, plotB + 8);
        ctx.save(); ctx.translate(plotL - 16, (plotT + plotB) / 2); ctx.rotate(-HALF_PI);
        ctx.fillText('Exam 2 Score', 0, 0); ctx.restore();

        for (let d of trainingData) {
            let px = mapVal(d.e1, 0, 100, plotL, plotR), py = mapVal(d.e2, 0, 100, plotB, plotT);
            ctx.fillStyle = d.label === 1 ? 'rgba(100,200,255,0.6)' : 'rgba(255,150,80,0.6)';
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(px, py, 7, 0, TWO_PI); ctx.fill(); ctx.stroke();
        }

        for (let t of testingData) {
            let px = mapVal(t.e1, 0, 100, plotL, plotR), py = mapVal(t.e2, 0, 100, plotB, plotT);
            ctx.fillStyle = t.label === 1 ? 'rgba(100,200,255,0.8)' : 'rgba(255,150,80,0.8)';
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            ctx.save(); ctx.translate(px, py); ctx.fillRect(-6, -6, 12, 12); ctx.strokeRect(-6, -6, 12, 12); ctx.restore();
        }

        const legendY = H * 0.86;
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '600 11px JetBrains Mono,monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.beginPath(); ctx.arc(16, legendY + 5, 5, 0, TWO_PI); ctx.fill();
        ctx.fillText('Train: 32 students (80%)', 28, legendY);

        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fillRect(W * 0.45, legendY, 10, 10); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.strokeRect(W * 0.45, legendY, 10, 10);
        ctx.fillText('Test: 8 students (20%)', W * 0.45 + 16, legendY);

        ctx.fillStyle = 'rgba(100,200,255,0.6)'; ctx.beginPath(); ctx.arc(16, legendY + 22, 5, 0, TWO_PI); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText('Admitted (+1)', 28, legendY + 17);
        ctx.fillStyle = 'rgba(255,150,80,0.6)'; ctx.beginPath(); ctx.arc(W * 0.45, legendY + 27, 5, 0, TWO_PI); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText('Rejected (−1)', W * 0.45 + 16, legendY + 17);

        updateStats('32 / 8', '—', 'Data Split');
    }

    // ============ SLIDE 08: ADMISSIONS DEMO ============
    function drawAdmissions() {
        clearCanvas(); frame++;
        const plotL = W * 0.1, plotR = W * 0.9, plotT = H * 0.06, plotB = H * 0.78;

        if (!converged) {
            for (let step = 0; step < 4; step++) {
                let d = trainingData[trainIndex];
                perceptron.train([d.x, d.y, 1], d.label);
                trainIndex = (trainIndex + 1) % trainingData.length;
                trained++;
                if (trainIndex === 0) {
                    let correct = 0;
                    for (let dd of trainingData) { if (perceptron.feedforward([dd.x, dd.y, 1]) === dd.label) correct++; }
                    trainAccuracy = correct / trainingData.length;
                    if (trainAccuracy >= 1.0) {
                        converged = true;
                        let testCorrect = 0;
                        for (let t of testingData) { if (perceptron.feedforward([t.x, t.y, 1]) === t.label) testCorrect++; }
                        testAccuracy = testCorrect / testingData.length;
                    }
                }
            }
        }

        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotR, plotB); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(plotL, plotB); ctx.lineTo(plotL, plotT); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '500 10px Inter,sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Exam 1 Score', (plotL + plotR) / 2, plotB + 6);
        ctx.save(); ctx.translate(plotL - 14, (plotT + plotB) / 2); ctx.rotate(-HALF_PI); ctx.fillText('Exam 2 Score', 0, 0); ctx.restore();

        for (let tp of bgTestPoints) {
            let guess = perceptron.feedforward([tp.x, tp.y, 1]);
            let px = mapVal(tp.e1, 0, 100, plotL, plotR), py = mapVal(tp.e2, 0, 100, plotB, plotT);
            ctx.fillStyle = guess === 1 ? 'rgba(100,255,150,0.06)' : 'rgba(255,100,80,0.06)';
            ctx.fillRect(px - 2, py - 2, 8, 8);
        }

        let w = perceptron.weights;
        if (w && w.length === 3 && Math.abs(w[1]) > 0.0001) {
            let gm = -(w[0] / w[1]), gb = -(w[2] / w[1]);
            let na = mapVal(0, 0, 100, -1, 1), nb = mapVal(100, 0, 100, -1, 1);
            let lx1 = mapVal(0, 0, 100, plotL, plotR), ly1 = mapVal(mapVal(gm * na + gb, -1, 1, 0, 100), 0, 100, plotB, plotT);
            let lx2 = mapVal(100, 0, 100, plotL, plotR), ly2 = mapVal(mapVal(gm * nb + gb, -1, 1, 0, 100), 0, 100, plotB, plotT);
            ctx.strokeStyle = 'rgba(16,185,129,0.8)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
        }

        for (let d of trainingData) {
            let px = mapVal(d.e1, 0, 100, plotL, plotR), py = mapVal(d.e2, 0, 100, plotB, plotT);
            let correct = perceptron.feedforward([d.x, d.y, 1]) === d.label;
            ctx.strokeStyle = correct ? 'rgba(16,185,129,0.8)' : 'rgba(239,68,68,0.9)';
            ctx.lineWidth = correct ? 1.5 : 2.5;
            ctx.fillStyle = d.label === 1 ? 'rgba(100,200,255,0.6)' : 'rgba(255,150,80,0.6)';
            ctx.beginPath(); ctx.arc(px, py, 7, 0, TWO_PI); ctx.fill(); ctx.stroke();
        }

        for (let t of testingData) {
            let px = mapVal(t.e1, 0, 100, plotL, plotR), py = mapVal(t.e2, 0, 100, plotB, plotT);
            let correct = perceptron.feedforward([t.x, t.y, 1]) === t.label;
            ctx.strokeStyle = correct ? 'rgba(16,185,129,0.8)' : 'rgba(239,68,68,0.9)';
            ctx.lineWidth = correct ? 2 : 3;
            ctx.fillStyle = t.label === 1 ? 'rgba(100,200,255,0.7)' : 'rgba(255,150,80,0.7)';
            ctx.save(); ctx.translate(px, py);
            ctx.fillRect(-6, -6, 12, 12); ctx.strokeRect(-6, -6, 12, 12);
            ctx.restore();
        }

        const hudY = H * 0.82;
        ctx.fillStyle = 'rgba(30,41,59,0.9)'; ctx.fillRect(plotL, hudY, plotR - plotL, H - hudY - 4);
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '500 11px JetBrains Mono,monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('Train: ●   Test: ■', plotL + 8, hudY + 6);

        if (converged) {
            ctx.fillStyle = '#10b981'; ctx.font = '600 11px JetBrains Mono,monospace';
            ctx.fillText(`CONVERGED ✓  Train: 100%  Test: ${(testAccuracy * 100).toFixed(0)}%`, plotL + 160, hudY + 6);
        } else {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText(`Training... Acc: ${(trainAccuracy * 100).toFixed(1)}%`, plotL + 160, hudY + 6);
        }

        updateStats(trained, converged ? `Train 100% / Test ${(testAccuracy * 100).toFixed(0)}%` : `${(trainAccuracy * 100).toFixed(1)}%`, converged ? 'Converged' : 'Training...');
    }

    // ============ MAIN LOOP ============
    function animate() { ctx.clearRect(0, 0, W, H); slides[currentSlide].draw(); requestAnimationFrame(animate); }
    init();
    </script>
</body>
